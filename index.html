<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jordan & Lauren Health App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f0f11;--surface:#1a1a1f;--surface2:#23232a;--surface3:#2c2c35;--accent:#e8a23a;--accent2:#3ab8a2;--lauren:#e864a0;--text:#f0eff4;--text2:#9998a8;--text3:#5f5e6e;--border:#2c2c35;--radius:14px;--rsm:8px;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* PROFILE SWITCHER */
.profile-sw{display:flex;padding:8px 14px;gap:8px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.profile-btn{flex:1;padding:7px;border-radius:var(--rsm);font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.profile-btn.active-j{background:rgba(232,162,58,.15);border-color:rgba(232,162,58,.4);color:var(--accent);}
.profile-btn.active-l{background:rgba(232,100,160,.15);border-color:rgba(232,100,160,.4);color:var(--lauren);}

/* HEADER */
.header{padding:12px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.header-day{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);line-height:1;}
.header-date{font-size:12px;color:var(--text2);margin-top:2px;}
.day-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.badge-work{background:rgba(232,162,58,.15);color:var(--accent);}
.badge-off{background:rgba(58,184,162,.15);color:var(--accent2);}
.badge-trans{background:rgba(232,72,72,.15);color:#e84848;}
.badge-lauren{background:rgba(232,100,160,.15);color:var(--lauren);}

/* TABS */
.tabs-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;padding:10px 4px;font-size:11px;font-weight:500;background:none;border:none;color:var(--text2);cursor:pointer;position:relative;white-space:nowrap;min-width:55px;font-family:'DM Sans',sans-serif;}
.tab-btn.active{color:var(--accent);}
.tab-btn.active.lauren-tab{color:var(--lauren);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
.tab-btn.active.lauren-tab::after{background:var(--lauren);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px 12px 28px;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{display:none;}
.sec-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin:16px 0 8px;}
.sec-lbl:first-child{margin-top:0;}

/* DAY NAV */
.day-nav{display:flex;gap:5px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.day-pill{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.day-pill.active{background:var(--accent);border-color:var(--accent);color:#000;}
.day-pill.work-day{border-color:rgba(232,162,58,.3);}

/* HERO */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.hero-greet{font-size:12px;color:var(--text2);margin-bottom:3px;}
.hero-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;line-height:1.2;}
.hero-sub{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5;}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;}
.stat-box{background:var(--surface2);border-radius:var(--rsm);padding:8px;text-align:center;}
.stat-val{font-size:16px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.prog-row{display:flex;align-items:center;gap:7px;margin-top:8px;}
.prog-lbl{font-size:12px;color:var(--text2);min-width:50px;}
.prog-bg{flex:1;height:4px;background:var(--surface3);border-radius:3px;}
.prog-bar{height:4px;border-radius:3px;}
.prog-pct{font-size:11px;font-weight:600;min-width:30px;text-align:right;}

/* WATER */
.water-box{background:var(--surface);border:1px solid rgba(58,184,162,.25);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
.water-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.water-lbl{font-size:13px;font-weight:600;color:var(--accent2);}
.water-cnt{font-size:12px;color:var(--text2);}
.water-cnt span{color:var(--accent2);font-weight:700;}
.water-btns{display:flex;flex-wrap:wrap;gap:6px;}
.water-btn{width:34px;height:34px;border-radius:7px;border:1.5px solid rgba(58,184,162,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text3);}
.water-btn.filled{background:rgba(58,184,162,.2);border-color:var(--accent2);}
.water-oz{font-size:11px;color:var(--text3);margin-top:6px;}

/* MEAL CARDS */
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:9px;overflow:hidden;}
.meal-card.eaten{border-color:rgba(58,184,162,.4);background:rgba(58,184,162,.03);}
.meal-hdr{display:flex;align-items:center;gap:9px;padding:11px 11px 7px;}
.meal-em{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;flex-shrink:0;position:relative;}
.eaten-ck{position:absolute;top:-4px;right:-4px;width:15px;height:15px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;}
.meal-info{flex:1;min-width:0;}
.meal-type{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;}
.meal-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-top:1px;}
.meal-macros{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.macro{font-size:10px;color:var(--text2);background:var(--surface2);padding:2px 5px;border-radius:20px;}
.macro span{color:var(--text);font-weight:500;}
.meal-actions{display:flex;gap:6px;padding:0 11px 11px;flex-wrap:wrap;}
.btn-sm{font-size:11px;font-weight:500;padding:5px 10px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-sm.accent{background:rgba(232,162,58,.12);border-color:rgba(232,162,58,.3);color:var(--accent);}
.btn-sm.teal{background:rgba(58,184,162,.1);border-color:rgba(58,184,162,.3);color:var(--accent2);}
.btn-sm.ate{background:rgba(58,184,162,.15);border-color:rgba(58,184,162,.5);color:var(--accent2);}
.btn-sm.uneaten{background:var(--surface2);border-color:var(--border);color:var(--text3);}
.port-row{display:flex;align-items:center;gap:7px;padding:0 11px 9px;}
.port-lbl{font-size:12px;color:var(--text2);flex:1;}
.port-ctrl{display:flex;align-items:center;gap:6px;}
.port-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
.port-val{font-size:13px;font-weight:600;color:var(--accent);min-width:24px;text-align:center;}
.port-vis{padding:8px 11px 11px;border-top:1px solid var(--border);}
.port-vis-title{font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.port-item{display:flex;align-items:baseline;gap:6px;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);}
.port-item:last-child{border-bottom:none;}
.p-icon{font-size:13px;width:17px;flex-shrink:0;}
.p-g{color:var(--text);font-weight:500;min-width:60px;}
.p-v{color:var(--text2);}

/* WORKOUT CARDS */
.wk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.wk-card.done{border-color:rgba(232,162,58,.4);}
.wk-head{padding:12px;}
.wk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.wk-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.wk-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(232,162,58,.15);color:var(--accent);}
.wk-badge.done{background:rgba(58,184,162,.15);color:var(--accent2);}
.wk-meta{display:flex;gap:6px;flex-wrap:wrap;}
.wk-chip{font-size:11px;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:20px;}
.wu-block{margin:0 12px 10px;background:rgba(58,184,162,.06);border:1px solid rgba(58,184,162,.15);border-radius:var(--rsm);padding:10px;}
.wu-title{font-size:10px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.wu-item{font-size:11px;color:var(--text2);padding:2px 0;}
.ex-list{padding:0 12px 10px;}
.ex-card{background:var(--surface2);border-radius:var(--rsm);padding:10px;margin-bottom:6px;}
.ex-card:last-child{margin-bottom:0;}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.ex-nm{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.ex-sets{font-size:10px;font-weight:600;color:var(--accent);background:rgba(232,162,58,.12);padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.ex-note{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;}
.ex-safe{font-size:10px;color:var(--accent2);margin-top:3px;background:rgba(58,184,162,.08);padding:2px 6px;border-radius:4px;display:inline-block;}
.ex-rest{font-size:10px;color:var(--text3);margin-top:4px;padding-top:4px;border-top:1px solid var(--border);}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);margin:0 12px 6px;border-radius:var(--rsm);}
.fin-lbl{font-size:11px;color:var(--text2);}
.fin-val{font-size:11px;font-weight:600;color:var(--accent);}
.wk-done-btn{margin:0 12px 12px;padding:9px;border-radius:var(--rsm);font-size:12px;font-weight:600;cursor:pointer;border:none;width:calc(100% - 24px);font-family:'DM Sans',sans-serif;}
.wk-done-btn.pending{background:rgba(232,162,58,.15);color:var(--accent);}
.wk-done-btn.completed{background:rgba(58,184,162,.15);color:var(--accent2);}
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.goal-prompt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.gp-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;}
.gp-sub{font-size:12px;color:var(--text2);line-height:1.5;}

/* SHOPPING */
.shop-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
.shop-week-lbl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.shop-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text2);padding:4px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.shop-prog{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.shop-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.shop-sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;}
.shop-sec-title{font-size:12px;font-weight:600;color:var(--text);}
.shop-count{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:20px;}
.shop-items-list{padding:0 12px 8px;}
.shop-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.shop-item:last-child{border-bottom:none;}
.shop-cb{width:18px;height:18px;min-width:18px;border-radius:4px;border:1.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;margin-top:1px;}
.shop-cb.checked{background:var(--accent2);border-color:var(--accent2);}
.shop-item-name{font-size:12px;color:var(--text);flex:1;line-height:1.4;}
.shop-item-name.checked{color:var(--text3);text-decoration:line-through;}
.shop-note{font-size:10px;color:var(--text3);font-style:italic;margin-top:2px;}
.shop-amt{font-size:11px;color:var(--text2);text-align:right;min-width:70px;}
.shop-amt.checked{color:var(--text3);}
.shop-reset{margin-top:8px;padding:9px;border-radius:var(--rsm);font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;}

/* LABS */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;margin-bottom:12px;}
.analyzing{display:flex;align-items:center;gap:8px;background:rgba(232,162,58,.1);border:1px solid rgba(232,162,58,.2);border-radius:var(--rsm);padding:9px 11px;font-size:13px;color:var(--accent);margin-bottom:10px;}
.labs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.labs-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px;}
.labs-date{font-size:12px;color:var(--text2);margin-bottom:10px;}
.lab-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.lab-row:last-child{border-bottom:none;}
.lab-name{font-size:12px;color:var(--text2);}
.lab-range{font-size:10px;color:var(--text3);margin-top:1px;}
.lab-val{font-size:12px;font-weight:600;}
.insight-card{background:rgba(58,184,162,.06);border:1px solid rgba(58,184,162,.2);border-radius:var(--rsm);padding:10px;margin-bottom:7px;}
.insight-title{font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:3px;}
.insight-text{font-size:12px;color:var(--text2);line-height:1.5;}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:480px;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.drawer.open{transform:translateX(-50%) translateY(0);}
.drawer-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:11px auto 0;}
.drawer-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;padding:13px 17px 3px;}
.drawer-sub{font-size:12px;color:var(--text2);padding:0 17px 11px;}
.swap-item{display:flex;align-items:center;gap:9px;padding:10px 17px;border-bottom:1px solid var(--border);cursor:pointer;}
.swap-item:last-child{border-bottom:none;}
.swap-em-box{font-size:19px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:7px;flex-shrink:0;}
.swap-info{flex:1;}
.swap-name{font-size:12px;font-weight:500;color:var(--text);}
.swap-macros{font-size:10px;color:var(--text2);margin-top:2px;}
.use-btn{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(232,162,58,.12);border:1px solid rgba(232,162,58,.3);color:var(--accent);cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.recipe-body{padding:0 17px 28px;}
.rec-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:12px 0 6px;}
.ing-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);}
.ing-row:last-child{border-bottom:none;}
.ing-nm{color:var(--text2);}
.ing-amt{color:var(--text);font-weight:500;}
.step-row{display:flex;gap:8px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.step-num{width:19px;height:19px;min-width:19px;border-radius:50%;background:rgba(232,162,58,.15);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.batch-tip{background:rgba(58,184,162,.08);border:1px solid rgba(58,184,162,.2);border-radius:var(--rsm);padding:9px;font-size:11px;color:var(--accent2);margin-top:9px;line-height:1.5;}
.rec-link{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--surface2);border-radius:var(--rsm);font-size:12px;color:var(--accent2);text-decoration:none;margin-top:8px;border:1px solid var(--border);}

</style>
</head>
<body>
<div id="app">
  <div class="profile-sw">
    <button class="profile-btn active-j" id="btnJ" onclick="switchProfile('J');document.getElementById('btnJ').className='profile-btn active-j';document.getElementById('btnL').className='profile-btn';">Jordan</button>
    <button class="profile-btn" id="btnL" onclick="switchProfile('L');document.getElementById('btnL').className='profile-btn active-l';document.getElementById('btnJ').className='profile-btn';">Lauren</button>
  </div>
  <div class="header">
    <div class="header-top">
      <div><div class="header-day" id="hDay">Monday</div><div class="header-date" id="hDate"></div></div>
      <div class="day-badge" id="hBadge"></div>
    </div>
  </div>
  <div class="tabs-bar" id="tabsBar">
    <button class="tab-btn active" onclick="switchTab('today',this)">Today</button>
    <button class="tab-btn" onclick="switchTab('meals',this)">Meals</button>
    <button class="tab-btn" onclick="switchTab('workouts',this)">Workouts</button>
    <button class="tab-btn" onclick="switchTab('shopping',this)">Shopping</button>
    <button class="tab-btn" onclick="switchTab('labs',this)">Labs</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="drawer-handle"></div><div id="drawerInner"></div></div>
<input type="file" id="pdfInput_J" style="display:none" accept=".pdf" onchange="handleLabPDF('J',event)">
<input type="file" id="pdfInput_L" style="display:none" accept=".pdf" onchange="handleLabPDF('L',event)">

<script>
// ── JORDAN MEALS ─────────────────────────────────────────────────────────────
var J_MEALS = {
  breakfast:[
    {id:'jb1',emoji:'🥣',name:'Overnight Oats Power Bowl',cal:450,pro:35,carb:48,fat:10,fib:12,
     portions:[{i:'🥣',n:'Rolled oats',g:'80g',v:'About 1 cup, size of your fist'},{i:'🫐',n:'Mixed berries',g:'80g',v:'Half cup, a loose handful'},{i:'🥛',n:'Almond milk',g:'240ml',v:'1 full cup'},{i:'💪',n:'Protein powder',g:'30g',v:'1 heaping scoop'}],
     recipe:{ings:[['Rolled oats','80g'],['Chia seeds','1 tbsp'],['Unsweetened almond milk','1 cup'],['Vanilla protein powder','1 scoop'],['Blueberries','half cup'],['Cinnamon','half tsp'],['Almond butter','1 tbsp']],steps:['Mix oats, chia seeds, and protein powder in a mason jar.','Pour almond milk over and stir well.','Refrigerate overnight, minimum 4 hours.','Top with berries and almond butter before eating.','Prep 5 jars every Sunday for the work week.'],batch:'Makes 5 jars in one Sunday prep. Stays fresh 5 days in fridge.',link:'https://www.budgetbytes.com/overnight-oats/'}},

// ── STATE ────────────────────────────────────────────────────────────────────
var today = new Date();
var todayDow = today.getDay();
var currentDow = todayDow;
var currentTab = 'today';
var activeProfile = 'J'; // 'J' or 'L'
var shopWeekOffset = 0;

function loadState() { try { return JSON.parse(localStorage.getItem('hwApp3') || '{}'); } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem('hwApp3', JSON.stringify(s)); } catch(e) {} }
function getState() { return loadState(); }
function setState(fn) { var s = loadState(); fn(s); saveState(s); }

function getDateKey(dow) {
  var d = new Date(today);
  d.setDate(d.getDate() + (dow - todayDow));
  return d.toISOString().split('T')[0];
}
function getWeekKey(off) {
  var d = new Date(today);
  var day = d.getDay();
  var diff = (day === 0 ? 1 : 8 - day);
  d.setDate(d.getDate() + diff + (off * 7));
  return d.toISOString().split('T')[0];
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getDayType(dow) {
  if (dow === 0) return 'transition';
  if (dow >= 3 && dow <= 6) return 'work';
  return 'off';
}
function getDayLabel(t) {
  return t === 'work' ? 'Work Night' : t === 'transition' ? 'Rest / Transition' : 'Off Day';
}
function getMult(pid, id) {
  var s = getState();
  var key = 'portions_' + pid;
  return (s[key] && s[key][id]) || 1;
}
function getMeals(pid) { return pid === 'J' ? J_MEALS : L_MEALS; }
function getAllMeals(pid) {
  var m = getMeals(pid);
  return m.breakfast.concat(m.lunch).concat(m.dinner).concat(m.snacks);
}
function getMeal(pid, dow, slot) {
  var s = getState();
  var dk = getDateKey(dow);
  var swapKey = 'swaps_' + pid;
  if (s[swapKey] && s[swapKey][dk] && s[swapKey][dk][slot]) return s[swapKey][dk][slot];
  var idx = dow % 3;
  var meals = getMeals(pid);
  var map = { breakfast: meals.breakfast[idx], lunch: meals.lunch[idx], dinner: meals.dinner[idx], snack: meals.snacks[idx] };
  return map[slot];
}
function getDayMeals(pid, dow) {
  if (pid === 'J') {
    var type = getDayType(dow);
    if (type === 'transition') return { breakfast: getMeal(pid,dow,'breakfast'), lunch: getMeal(pid,dow,'lunch'), snack: getMeal(pid,dow,'snack') };
    return { breakfast: getMeal(pid,dow,'breakfast'), lunch: getMeal(pid,dow,'lunch'), dinner: getMeal(pid,dow,'dinner'), snack: getMeal(pid,dow,'snack') };
  }
  return { breakfast: getMeal(pid,dow,'breakfast'), lunch: getMeal(pid,dow,'lunch'), dinner: getMeal(pid,dow,'dinner'), snack: getMeal(pid,dow,'snack') };
}
function isMealEaten(pid, dow, slot) {
  var s = getState();
  var key = 'eaten_' + pid;
  return !!(s[key] && s[key][getDateKey(dow)] && s[key][getDateKey(dow)][slot]);
}
function isWorkoutDone(pid, idx) {
  var s = getState();
  var key = 'wkdone_' + pid;
  return !!(s[key] && s[key][idx]);
}
function getWaterCount(pid, dow) {
  var s = getState();
  var key = 'water_' + pid;
  return (s[key] && s[key][getDateKey(dow)]) || 0;
}
function getCustomMeals(pid) {
  var s = getState();
  var key = 'custom_' + pid;
  return s[key] || [];
}
function scaleG(g, m) {
  if (m === 1) return g;
  var match = g.match(/^(\d+)(.*)/);
  if (match) return Math.round(parseInt(match[1]) * m) + match[2];
  return g;
}

function fetchUrlNutrition(pid) {
  var url = document.getElementById('cm_url').value.trim();
  if (!url) { alert('Please enter a URL.'); return; }
  var btn = document.getElementById('cm_fetch_btn');
  btn.textContent = 'Fetching...';
  btn.disabled = true;
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      messages: [{
        role: 'user',
        content: 'Visit this URL and extract nutrition facts: ' + url + '\n\nReturn ONLY a JSON object with no markdown:\n{"name":"meal name","cal":0,"pro":0,"carb":0,"fat":0,"fib":0,"notes":"brief description"}\n\nIf you cannot access the URL or find nutrition data, return {"error":"Could not retrieve nutrition data from this URL"}'
      }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var text = data.content.map(function(c) { return c.type === 'text' ? c.text : ''; }).join('');
    try {
      var parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      if (parsed.error) {
        alert(parsed.error);
        btn.textContent = 'Fetch nutrition';
        btn.disabled = false;
        return;
      }
      document.getElementById('cm_name').value = parsed.name || '';
      document.getElementById('cm_cal').value = parsed.cal || '';
      document.getElementById('cm_pro').value = parsed.pro || '';
      document.getElementById('cm_carb').value = parsed.carb || '';
      document.getElementById('cm_fat').value = parsed.fat || '';
      document.getElementById('cm_fib').value = parsed.fib || '';
      btn.textContent = 'Fetch nutrition';
      btn.disabled = false;
    } catch(e) {
      alert('Could not parse nutrition data. Please fill in manually.');
      btn.textContent = 'Fetch nutrition';
      btn.disabled = false;
    }
  })
  .catch(function() {
    alert('Could not connect to fetch service. Please fill in manually.');
    btn.textContent = 'Fetch nutrition';
    btn.disabled = false;
  });
}

  var loadingDiv = document.getElementById('content');
  if (loadingDiv) {
    loadingDiv.innerHTML = '<div style="padding:40px;text-align:center;color:#9998a8;font-size:14px">Generating workout plan for Lauren...</div>';
  }
  var prompt = 'Create a personalized workout plan for Lauren.\n\n';
  prompt += 'Profile: 31-year-old woman, 5ft 5in, 145 lbs.\n';
  prompt += 'Primary goal: ' + goals.primaryGoal + '\n';
  prompt += 'Activity level: ' + goals.activityLevel + '\n';
  prompt += 'Days per week: ' + goals.daysPerWeek + '\n';
  prompt += 'Postpartum status: ' + goals.isPostpartum + '\n';
  if (goals.postpartumDetail) prompt += 'Postpartum detail: ' + goals.postpartumDetail + '\n';
  prompt += 'Cardio preference: ' + goals.cardioPreference + '\n';
  if (goals.injuries) prompt += 'Injuries/concerns: ' + goals.injuries + '\n';
  if (goals.otherNotes) prompt += 'Other notes: ' + goals.otherNotes + '\n';
  prompt += '\nCreate ' + goals.daysPerWeek + ' workout sessions per week. Schedule is flexible, not tied to specific days.\n';
  prompt += 'If postpartum (especially early postpartum or no PT clearance), focus on pelvic floor and core reconnection. Avoid crunches, sit-ups, heavy planks, and heavy compound lifts until cleared.\n';
  prompt += 'Return ONLY a JSON array with no markdown, each session object having: {session:1, focus:"string", exercises:[{name:"",sets:"",rest:"",note:"",safe:""}], warmup:["string"], finisher:"string"}\n';
  prompt += 'Each exercise should have a note on technique and a safe field explaining why it is appropriate. Keep sessions to 40-50 minutes.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var text = data.content.map(function(c) { return c.type === 'text' ? c.text : ''; }).join('');
    try {
      var parsed = JSON.parse(text.replace(/```json|```/g,'').trim());

      render();
    } catch(e) {
      setState(function(s) { s.laurenWorkouts = []; });
      render();
    }
  })
  .catch(function() {
    setState(function(s) { s.laurenWorkouts = []; });
    render();
  });
}

function handleLabPDF(pid, event) {
  var file = event.target.files[0];
  if (!file) return;
  setState(function(s) { s['labsAnalyzing_' + pid] = true; });
  render();
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    analyzeLabPDF(pid, base64, file.name);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function analyzeLabPDF(pid, base64, filename) {
  var name = pid === 'J' ? 'Jordan Walters, 37-year-old male, 6ft 2in, 226 lbs, night shift worker with bulged disc' : 'Lauren, 31-year-old female, 5ft 5in, 145 lbs';
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          {type:'document', source:{type:'base64', media_type:'application/pdf', data:base64}},
          {type:'text', text:'This is a blood lab results PDF for ' + name + '. Extract lab values and return ONLY a JSON object with no markdown:\n{"date":"collection date","values":[{"name":"test name","value":"numeric value with units","range":"reference range","status":"good|warn|bad"}],"insights":[{"title":"short title","text":"1-2 sentence personalized recommendation"}]}\n\nStatus: good=in normal range, warn=borderline, bad=significantly outside. Only include insights for abnormal or borderline values.'}
        ]
      }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var text = data.content.map(function(c) { return c.type === 'text' ? c.text : ''; }).join('');
    try {
      var parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      setState(function(s) { s['labs_' + pid] = parsed; s['labsAnalyzing_' + pid] = false; });
    } catch(e) {
      setState(function(s) { s['labs_' + pid] = {date:filename,values:[],insights:[{title:'Parse note',text:'Lab values extracted but could not be formatted. Try uploading again.'}]}; s['labsAnalyzing_' + pid] = false; });
    }
    render();
  })
  .catch(function() {
    setState(function(s) { s['labs_' + pid] = {date:filename,values:[],insights:[{title:'Connection error',text:'Could not connect to analysis service.'}]}; s['labsAnalyzing_' + pid] = false; });
    render();
  });
}

function renderShopping() {
  var s = getState();

  var totalItems = 0, checkedCount = 0;
  for (var si = 0; si < SHOP_SECTIONS.length; si++) {
    totalItems += SHOP_SECTIONS[si].items.length;

      if (checked[SHOP_SECTIONS[si].items[ii].id]) checkedCount++;

    '<div style="flex:1;margin:0 8px"><div class="prog-bg"><div class="prog-bar" style="width:' + Math.round(checkedCount/totalItems*100) + '%;background:#3ab8a2"></div></div></div>' +
    '<span style="font-size:12px;color:#3ab8a2;font-weight:600">' + Math.round(checkedCount/totalItems*100) + '%</span>' +
    '</div>';

    '<span style="background:rgba(232,162,58,.15);color:#e8a23a;padding:3px 8px;border-radius:10px;font-weight:600">J = Jordan</span>' +
    '<span style="background:rgba(232,100,160,.15);color:#e864a0;padding:3px 8px;border-radius:10px;font-weight:600">L = Lauren</span>' +
    '<span style="background:rgba(58,184,162,.15);color:#3ab8a2;padding:3px 8px;border-radius:10px;font-weight:600">B = Both</span>' +
    '</div>';
  for (var si2 = 0; si2 < SHOP_SECTIONS.length; si2++) {

    for (var ii2 = 0; ii2 < sec.items.length; ii2++) { if (checked[sec.items[ii2].id]) secChecked++; }

    html += '<div class="shop-sec">' +
      '<div class="shop-sec-hdr" onclick="toggleShopSection(\'' + sec.id + '\')">' +
      '<span class="shop-sec-title">' + sec.label + '</span>' +
      '<span class="shop-count">' + secChecked + '/' + sec.items.length + ' ' + (isOpen?'\u25B2':'\u25BC') + '</span>' +
      '</div>';
    if (isOpen) {
      html += '<div class="shop-items-list">';
      for (var ii3 = 0; ii3 < sec.items.length; ii3++) {
        var item = sec.items[ii3];
        var isChecked = !!checked[item.id];
        var whoColor = item.who==='J'?'#e8a23a':item.who==='L'?'#e864a0':'#3ab8a2';
        html += '<div class="shop-item" onclick="toggleShopItem(\'' + item.id + '\',\'' + wk + '\')">' +

          '<div style="flex:1">' +

          (item.note?'<div class="shop-note">' + item.note + '</div>':'') +
          '</div>' +
          '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;background:' + whoColor + '22;color:' + whoColor + ';margin-right:6px">' + item.who + '</span>' +
          '<div class="shop-amt' + (isChecked?' checked':'') + '">' + item.amt + '</div>' +
          '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '<button class="shop-reset" onclick="resetShop(\'' + wk + '\')">Reset all checkboxes for this week</button>';
  return html;
}

function saveAndSwapCustom(pid, slot, dow) {
  var name = document.getElementById('cm_name').value.trim();
  if (!name) { alert('Please enter a meal name.'); return; }
  var meal = {
    id: 'custom_' + Date.now(),
    emoji: '🍽',
    name: name,
    cal: parseInt(document.getElementById('cm_cal').value)||0,
    pro: parseInt(document.getElementById('cm_pro').value)||0,
    carb: parseInt(document.getElementById('cm_carb').value)||0,
    fat: parseInt(document.getElementById('cm_fat').value)||0,
    fib: parseInt(document.getElementById('cm_fib').value)||0,
    portions: [{i:'🍽',n:'Full serving',g:'1 serving',v:'As prepared'}],
    recipe: {ings:[], steps:['Custom meal.'], batch:'', link:''}
  };
  setState(function(s) {
    var key = 'custom_' + pid;
    if (!s[key]) s[key] = [];
    s[key].push(meal);
    var swapKey = 'swaps_' + pid;
    if (!s[swapKey]) s[swapKey] = {};
    var dk = getDateKey(dow);
    if (!s[swapKey][dk]) s[swapKey][dk] = {};
    s[swapKey][dk][slot] = meal;
  });
  closeDrawer();
  setTimeout(render, 320);
}

    selectField('lg_postpartum','Postpartum status',['Not postpartum','Yes - less than 6 months postpartum','Yes - 6 to 12 months postpartum','Yes - over 12 months postpartum'],goals.isPostpartum) +

    '<div><label style="font-size:11px;color:#9998a8;display:block;margin-bottom:4px">If postpartum - any PT clearance, diastasis recti diagnosis, or symptoms? (optional)</label>' +
    '<textarea id="lg_ppdetail" rows="2" placeholder="e.g. cleared by PT, 2cm diastasis diagnosed, no symptoms..." style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2c2c35;background:#23232a;color:#f0eff4;font-size:13px;resize:none">' + (goals.postpartumDetail||'') + '</textarea></div>' +

    selectField('lg_cardio','Cardio preference',['Walking','Cycling','Swimming','Group fitness classes','Low impact only','No cardio preference'],goals.cardioPreference) +

    '<div><label style="font-size:11px;color:#9998a8;display:block;margin-bottom:4px">Any injuries, pain, or areas to avoid?</label>' +
    '<input id="lg_injuries" type="text" placeholder="e.g. bad knee, shoulder pain, lower back..." value="' + (goals.injuries||'') + '" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2c2c35;background:#23232a;color:#f0eff4;font-size:13px"></div>' +

    '<div><label style="font-size:11px;color:#9998a8;display:block;margin-bottom:4px">Anything else the plan should know?</label>' +
    '<textarea id="lg_notes" rows="2" placeholder="Any other goals, preferences, or context..." style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2c2c35;background:#23232a;color:#f0eff4;font-size:13px;resize:none">' + (goals.otherNotes||'') + '</textarea></div>' +

    '<div style="display:flex;gap:8px;margin-top:4px">' +
    '<button onclick="closeDrawer()" style="flex:1;padding:11px;border-radius:8px;background:#23232a;border:1px solid #2c2c35;color:#9998a8;font-size:13px;cursor:pointer">Cancel</button>' +
    '<button onclick="saveLaurenGoals()" style="flex:1;padding:11px;border-radius:8px;background:rgba(232,100,160,.15);border:1px solid rgba(232,100,160,.3);color:#e864a0;font-size:13px;font-weight:600;cursor:pointer">Generate my plan</button>' +
    '</div></div>';
  showDrawer(html);
}

function selectField(id, label, options, current) {
  var opts = '';
  for (var i = 0; i < options.length; i++) {
    opts += '<option value="' + options[i] + '"' + (current===options[i]?' selected':'') + '>' + options[i] + '</option>';
  }
  return '<div><label style="font-size:11px;color:#9998a8;display:block;margin-bottom:4px">' + label + '</label>' +
    '<select id="' + id + '" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2c2c35;background:#23232a;color:#f0eff4;font-size:13px">' + opts + '</select></div>';
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  var tabMap = { today: renderToday, meals: renderMeals, workouts: renderWorkouts, shopping: renderShopping, labs: renderLabs };
  var fn = tabMap[currentTab];
  document.getElementById('content').innerHTML = fn ? fn(currentDow) : '';
}


// ── INIT ─────────────────────────────────────────────────────────────────────
(function() {
  var d = new Date(today);
  document.getElementById('hDay').textContent = DAYS[todayDow] + ' - Today';
  document.getElementById('hDate').textContent = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('hBadge').textContent = getDayLabel(getDayType(todayDow));
  document.getElementById('hBadge').className = 'day-badge ' + (getDayType(todayDow)==='work'?'badge-work':getDayType(todayDow)==='transition'?'badge-trans':'badge-off');
  render();
})();
</script>
</body>
</html>
