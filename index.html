<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jordan's Health App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f11;--surface:#1a1a1f;--surface2:#23232a;--surface3:#2c2c35;
  --accent:#e8a23a;--accent2:#3ab8a2;--accent3:#e84848;
  --text:#f0eff4;--text2:#9998a8;--text3:#5f5e6e;
  --border:#2c2c35;--radius:14px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.header{padding:14px 18px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.header-day{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text);line-height:1;}
.header-date{font-size:12px;color:var(--text2);margin-top:2px;}
.day-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.04em;}
.badge-work{background:rgba(232,162,58,.15);color:var(--accent);}
.badge-off{background:rgba(58,184,162,.15);color:var(--accent2);}
.badge-transition{background:rgba(232,72,72,.15);color:var(--accent3);}
.tabs-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;padding:11px 4px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;background:none;border:none;color:var(--text2);cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;min-width:55px;}
.tab-btn.active{color:var(--accent);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
.content{flex:1;overflow-y:auto;padding:14px 14px 30px;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{display:none;}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin:18px 0 8px;}
.section-label:first-child{margin-top:0;}
.day-nav{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.day-pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.day-pill.active{background:var(--accent);border-color:var(--accent);color:#000;}
.day-pill.work-day{border-color:rgba(232,162,58,.3);}
.today-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.hero-greeting{font-size:13px;color:var(--text2);margin-bottom:3px;}
.hero-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1.2;}
.hero-sub{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5;}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px;}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:9px;text-align:center;}
.stat-val{font-size:17px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.progress-ring{display:flex;align-items:center;gap:8px;margin-top:10px;}
.ring-label{font-size:12px;color:var(--text2);min-width:52px;}
.ring-bar-bg{flex:1;height:5px;background:var(--surface3);border-radius:3px;}
.ring-bar{height:5px;border-radius:3px;transition:width .4s;}
.ring-pct{font-size:12px;font-weight:600;min-width:34px;text-align:right;}
.water-tracker{background:var(--surface);border:1px solid rgba(58,184,162,.25);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.water-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.water-label{font-size:13px;font-weight:600;color:var(--accent2);}
.water-count{font-size:13px;color:var(--text2);}
.water-count span{color:var(--accent2);font-weight:700;}
.water-bottles{display:flex;flex-wrap:wrap;gap:7px;}
.water-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid rgba(58,184,162,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;color:var(--text3);}
.water-btn.filled{background:rgba(58,184,162,.2);border-color:var(--accent2);}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.meal-card.eaten{border-color:rgba(58,184,162,.4);background:rgba(58,184,162,.03);}
.meal-header{display:flex;align-items:center;gap:10px;padding:12px 12px 8px;}
.meal-emoji{font-size:26px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:9px;flex-shrink:0;position:relative;}
.eaten-check{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;}
.meal-info{flex:1;min-width:0;}
.meal-type{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;}
.meal-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-top:1px;}
.meal-macros{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.macro{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 6px;border-radius:20px;}
.macro span{color:var(--text);font-weight:500;}
.meal-actions{display:flex;gap:7px;padding:0 12px 12px;flex-wrap:wrap;}
.btn-sm{font-size:12px;font-weight:500;padding:6px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-sm:active{opacity:.7;}
.btn-sm.accent{background:rgba(232,162,58,.12);border-color:rgba(232,162,58,.3);color:var(--accent);}
.btn-sm.teal{background:rgba(58,184,162,.1);border-color:rgba(58,184,162,.3);color:var(--accent2);}
.btn-sm.ate{background:rgba(58,184,162,.15);border-color:rgba(58,184,162,.5);color:var(--accent2);}
.btn-sm.uneaten{background:var(--surface2);border-color:var(--border);color:var(--text3);}
.portion-row{display:flex;align-items:center;gap:8px;padding:0 12px 10px;}
.portion-label{font-size:12px;color:var(--text2);flex:1;}
.portion-ctrl{display:flex;align-items:center;gap:7px;}
.portion-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.portion-val{font-size:13px;font-weight:600;color:var(--accent);min-width:26px;text-align:center;}
.portion-visual{padding:8px 12px 12px;border-top:1px solid var(--border);}
.portion-visual-title{font-size:11px;color:var(--text3);margin-bottom:7px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.portion-item{display:flex;align-items:baseline;gap:7px;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.portion-item:last-child{border-bottom:none;}
.p-icon{font-size:14px;width:18px;flex-shrink:0;}
.p-grams{color:var(--text);font-weight:500;min-width:65px;}
.p-visual{color:var(--text2);}
.workout-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.workout-card.done{border-color:rgba(232,162,58,.4);}
.wk-head{padding:14px;}
.wk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.wk-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.wk-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:rgba(232,162,58,.15);color:var(--accent);}
.wk-badge.done{background:rgba(58,184,162,.15);color:var(--accent2);}
.wk-meta{display:flex;gap:7px;flex-wrap:wrap;}
.wk-chip{font-size:11px;color:var(--text2);background:var(--surface2);padding:3px 9px;border-radius:20px;}
.warmup-block{margin:0 14px 12px;background:rgba(58,184,162,.06);border:1px solid rgba(58,184,162,.15);border-radius:var(--radius-sm);padding:10px;}
.warmup-title{font-size:11px;font-weight:600;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.warmup-item{font-size:12px;color:var(--text2);padding:2px 0;}
.ex-list{padding:0 14px 12px;}
.ex-card{background:var(--surface2);border-radius:var(--radius-sm);padding:11px;margin-bottom:7px;}
.ex-card:last-child{margin-bottom:0;}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:7px;}
.ex-name{font-size:14px;font-weight:500;color:var(--text);flex:1;}
.ex-sets-badge{font-size:11px;font-weight:600;color:var(--accent);background:rgba(232,162,58,.12);padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.ex-note{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5;}
.ex-back-safe{font-size:11px;color:var(--accent2);margin-top:4px;background:rgba(58,184,162,.08);padding:3px 7px;border-radius:4px;display:inline-block;}
.ex-rest{font-size:11px;color:var(--text3);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
.finisher-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);margin:0 14px 7px;border-radius:var(--radius-sm);}
.finisher-label{font-size:12px;color:var(--text2);}
.finisher-val{font-size:12px;font-weight:600;color:var(--accent);}
.workout-done-btn{margin:0 14px 14px;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;width:calc(100% - 28px);transition:all .2s;}
.workout-done-btn.pending{background:rgba(232,162,58,.15);color:var(--accent);}
.workout-done-btn.completed{background:rgba(58,184,162,.15);color:var(--accent2);}
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
/* SHOPPING */
.shop-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.shop-week-label{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.shop-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);padding:5px 12px;font-size:13px;cursor:pointer;}
.shop-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.shop-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;}
.shop-section-title{font-size:13px;font-weight:600;color:var(--text);}
.shop-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:20px;}
.shop-items-list{padding:0 14px 10px;}
.shop-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.shop-item:last-child{border-bottom:none;}
.shop-cb{width:20px;height:20px;min-width:20px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.shop-cb.checked{background:var(--accent2);border-color:var(--accent2);}
.shop-item-name{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.shop-item-name.checked{color:var(--text3);text-decoration:line-through;}
.shop-note{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;}
.shop-amt{font-size:12px;color:var(--text2);text-align:right;min-width:80px;}
.shop-amt.checked{color:var(--text3);}
.shop-reset{margin-top:8px;padding:10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);cursor:pointer;width:100%;}
.shop-progress{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
/* LABS / PDF */
.labs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.labs-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px;}
.labs-date{font-size:12px;color:var(--text2);margin-bottom:12px;}
.lab-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.lab-row:last-child{border-bottom:none;}
.lab-name{font-size:13px;color:var(--text2);}
.lab-val{font-size:13px;font-weight:600;}
.lab-val.good{color:var(--accent2);}
.lab-val.warn{color:var(--accent);}
.lab-val.bad{color:var(--accent3);}
.lab-range{font-size:11px;color:var(--text3);margin-top:1px;}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px;}
.upload-zone:hover{border-color:var(--accent);}
.upload-icon{font-size:32px;margin-bottom:8px;}
.upload-label{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--text2);}
.upload-input{display:none;}
.analyzing-badge{display:flex;align-items:center;gap:8px;background:rgba(232,162,58,.1);border:1px solid rgba(232,162,58,.2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;}
.analyzing-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.insight-card{background:rgba(58,184,162,.06);border:1px solid rgba(58,184,162,.2);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.insight-title{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:4px;}
.insight-text{font-size:13px;color:var(--text2);line-height:1.5;}
/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:480px;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.drawer.open{transform:translateX(-50%) translateY(0);}
.drawer-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:12px auto 0;}
.drawer-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;padding:14px 18px 4px;}
.drawer-sub{font-size:13px;color:var(--text2);padding:0 18px 12px;}
.swap-item{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);}
.swap-item:last-child{border-bottom:none;}
.swap-emoji-box{font-size:21px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:7px;flex-shrink:0;}
.swap-info{flex:1;}
.swap-name{font-size:13px;font-weight:500;color:var(--text);}
.swap-macros{font-size:11px;color:var(--text2);margin-top:2px;}
.use-btn{font-size:12px;padding:5px 11px;border-radius:20px;background:rgba(232,162,58,.12);border:1px solid rgba(232,162,58,.3);color:var(--accent);cursor:pointer;flex-shrink:0;}
.recipe-body{padding:0 18px 30px;}
.rec-section{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 7px;}
.ing-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);}
.ing-row:last-child{border-bottom:none;}
.ing-name{color:var(--text2);}
.ing-amt{color:var(--text);font-weight:500;}
.step-row{display:flex;gap:9px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:9px;}
.step-num{width:21px;height:21px;min-width:21px;border-radius:50%;background:rgba(232,162,58,.15);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.batch-tip{background:rgba(58,184,162,.08);border:1px solid rgba(58,184,162,.2);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--accent2);margin-top:10px;line-height:1.5;}
.rec-link{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;color:var(--accent2);text-decoration:none;margin-top:9px;border:1px solid var(--border);}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div><div class="header-day" id="hDay">Monday</div><div class="header-date" id="hDate"></div></div>
      <div class="day-badge" id="hBadge"></div>
    </div>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('today',this)">Today</button>
    <button class="tab-btn" onclick="switchTab('meals',this)">Meals</button>
    <button class="tab-btn" onclick="switchTab('workouts',this)">Workouts</button>
    <button class="tab-btn" onclick="switchTab('shopping',this)">Shopping</button>
    <button class="tab-btn" onclick="switchTab('labs',this)">Labs</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="drawer-handle"></div><div id="drawerInner"></div></div>
<input type="file" id="pdfInput" class="upload-input" accept=".pdf" onchange="handlePDF(event)">

<script>
var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

var MEALS={
  breakfast:[
    {id:'b1',emoji:'\u{1F963}',name:'Overnight Oats Power Bowl',cal:450,pro:35,carb:48,fat:10,fib:12,
     portions:[{i:'\u{1F963}',n:'Rolled oats',g:'80g',v:'~1 cup - size of your fist'},{i:'\u{1FAD0}',n:'Mixed berries',g:'80g',v:'~half cup - a loose handful'},{i:'\u{1F95B}',n:'Almond milk',g:'240ml',v:'1 full cup'},{i:'\uD83D\uDCAA',n:'Protein powder',g:'30g',v:'1 heaping scoop'}],
     recipe:{ings:[['Rolled oats','80g'],['Chia seeds','1 tbsp'],['Unsweetened almond milk','1 cup'],['Vanilla protein powder','1 scoop'],['Blueberries','half cup'],['Cinnamon','half tsp'],['Almond butter','1 tbsp']],
     steps:['Mix oats, chia seeds, and protein powder in a mason jar.','Pour almond milk over and stir well.','Refrigerate overnight (min 4 hours).','Top with berries and almond butter before eating.','Prep 5 jars every Sunday for the work week.'],
     batch:'Makes 5 jars in one Sunday prep. Stays fresh 5 days in fridge.',link:'https://www.budgetbytes.com/overnight-oats/'}},
    {id:'b2',emoji:'\u{1F373}',name:'High-Protein Egg Scramble',cal:420,pro:40,carb:12,fat:22,fib:3,
     portions:[{i:'\u{1F95A}',n:'Whole eggs',g:'3 large',v:'3 eggs stacked - size of your fist'},{i:'\u{1F95A}',n:'Egg whites',g:'half cup',v:'Fills half a small glass'},{i:'\uD83E\uDDC0',n:'Feta cheese',g:'~3 tbsp',v:'Thumbnail-sized crumbles'},{i:'\uD83E\uDD6C',n:'Baby spinach',g:'2 big handfuls',v:'Wilts down to almost nothing'}],
     recipe:{ings:[['Large eggs','3'],['Egg whites','half cup'],['Baby spinach','2 handfuls'],['Feta cheese','3 tbsp crumbled'],['Cherry tomatoes','half cup halved'],['Olive oil','1 tsp'],['Garlic powder','quarter tsp']],
     steps:['Whisk eggs and egg whites together.','Heat olive oil in non-stick pan over medium heat.','Add tomatoes, cook 2 min. Add spinach, stir until wilted.','Pour egg mix over vegetables. Fold gently until just set.','Remove from heat, top with feta.'],
     batch:'Hard-boil 8 eggs on Sunday as backup.',link:'https://www.eatingwell.com/recipe/252390/scrambled-eggs-with-spinach-tomatoes/'}},

// State
var today=new Date();
var todayDow=today.getDay();
var currentDow=todayDow;
var currentTab='today';
var shopWeekOffset=0;

function loadState(){try{return JSON.parse(localStorage.getItem('jwHealth2')||'{}');}catch(e){return{};}}
function saveState(s){try{localStorage.setItem('jwHealth2',JSON.stringify(s));}catch(e){}}
function getState(){return loadState();}
function setState(fn){var s=loadState();fn(s);saveState(s);}

function getDateKey(dow){var d=new Date(today);d.setDate(d.getDate()+(dow-todayDow));return d.toISOString().split('T')[0];}
function getWeekKey(off){
  var d=new Date(today);var day=d.getDay();
  var diff=(day===0?1:8-day);
  d.setDate(d.getDate()+diff+(off*7));
  return d.toISOString().split('T')[0];
}
function getDayType(dow){if(dow===0)return'transition';if(dow>=3&&dow<=6)return'work';return'off';}
function getDayLabel(t){return t==='work'?'Work Night':t==='transition'?'Rest / Transition':'Off Day';}
function getBadgeClass(t){return t==='work'?'badge-work':t==='transition'?'badge-transition':'badge-off';}
function getMult(id){var s=getState();return(s.portions&&s.portions[id])||1;}
function getMeal(dow,slot){
  var s=getState();var dk=getDateKey(dow);
  if(s.swaps&&s.swaps[dk]&&s.swaps[dk][slot])return s.swaps[dk][slot];
  var idx=dow%3;
  var map={breakfast:MEALS.breakfast[idx],lunch:MEALS.lunch[idx],dinner:MEALS.dinner[idx],snack:MEALS.snacks[idx]};
  return map[slot];
}
function getDayMeals(dow){
  var type=getDayType(dow);
  if(type==='transition')return{breakfast:getMeal(dow,'breakfast'),lunch:getMeal(dow,'lunch'),snack:getMeal(dow,'snack')};
  return{breakfast:getMeal(dow,'breakfast'),lunch:getMeal(dow,'lunch'),dinner:getMeal(dow,'dinner'),snack:getMeal(dow,'snack')};
}
function isMealEaten(dow,slot){var s=getState();return!!(s.eaten&&s.eaten[getDateKey(dow)]&&s.eaten[getDateKey(dow)][slot]);}
function isWorkoutDone(dow){var s=getState();return!!(s.workouts&&s.workouts[getDateKey(dow)]);}
function getWaterCount(dow){var s=getState();return(s.water&&s.water[getDateKey(dow)])||0;}
function allMeals(){return MEALS.breakfast.concat(MEALS.lunch).concat(MEALS.dinner).concat(MEALS.snacks);}
function scaleG(g,m){if(m===1)return g;var match=g.match(/^(\d+)(.*)/);if(match)return Math.round(parseInt(match[1])*m)+match[2];return g;}

function renderHeader(dow){
  var type=getDayType(dow);
  var d=new Date(today);d.setDate(d.getDate()+(dow-todayDow));
  document.getElementById('hDay').textContent=DAYS[dow]+(dow===todayDow?' - Today':'');
  document.getElementById('hDate').textContent=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  var b=document.getElementById('hBadge');b.textContent=getDayLabel(type);b.className='day-badge '+getBadgeClass(type);
}

function dayNav(){
  var html='<div class="day-nav">';
  for(var i=0;i<7;i++){
    var work=getDayType(i)==='work';
    html+='<div class="day-pill'+(i===currentDow?' active':'')+(work?' work-day':'')+'" onclick="changeDay('+i+')">'
      +SHORT[i]+(i===todayDow?'\u00B7':'')+'</div>';
  }
  return html+'</div>';
}

function mealCard(meal,slot,dow){
  var m=getMult(meal.id);
  var cal=Math.round(meal.cal*m),pro=Math.round(meal.pro*m),carb=Math.round(meal.carb*m),fat=Math.round(meal.fat*m);
  var eaten=isMealEaten(dow,slot);
  var label={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snack'}[slot];
  var portionRows='';
  for(var pi=0;pi<meal.portions.length;pi++){
    var p=meal.portions[pi];
    portionRows+='<div class="portion-item"><span class="p-icon">'+p.i+'</span><span class="p-grams">'+scaleG(p.g,m)+'</span><span class="p-visual">'+p.n+' - '+p.v+'</span></div>';
  }
  return '<div class="meal-card'+(eaten?' eaten':'')+'">'+
    '<div class="meal-header">'+
    '<div class="meal-emoji">'+meal.emoji+(eaten?'<div class="eaten-check">\u2713</div>':'')+'</div>'+
    '<div class="meal-info">'+
    '<div class="meal-type">'+label+'</div>'+
    '<div class="meal-name">'+meal.name+'</div>'+
    '<div class="meal-macros"><div class="macro"><span>'+cal+'</span> cal</div><div class="macro"><span>'+pro+'g</span> protein</div><div class="macro"><span>'+carb+'g</span> carbs</div><div class="macro"><span>'+fat+'g</span> fat</div></div>'+
    '</div></div>'+
    '<div class="portion-row"><span class="portion-label">Serving size</span>'+
    '<div class="portion-ctrl">'+
    '<button class="portion-btn" onclick="adjPortion(\''+meal.id+'\',-1)">\u2212</button>'+
    '<div class="portion-val">'+m+'\u00D7</div>'+
    '<button class="portion-btn" onclick="adjPortion(\''+meal.id+'\',1)">+</button>'+
    '</div></div>'+
    '<div class="meal-actions">'+
    '<button class="btn-sm accent" onclick="openRecipe(\''+meal.id+'\')">Recipe</button>'+
    '<button class="btn-sm teal" onclick="openSwap(\''+slot+'\','+dow+')">Swap</button>'+
    '<button class="btn-sm" onclick="toggleEl(\'pv-'+slot+'-'+dow+'\')">Portions</button>'+
    '<button class="btn-sm '+(eaten?'ate':'uneaten')+'" onclick="toggleEaten(\''+slot+'\','+dow+')">'+(eaten?'\u2713 Eaten':'Mark eaten')+'</button>'+
    '</div>'+
    '<div id="pv-'+slot+'-'+dow+'" style="display:none">'+
    '<div class="portion-visual"><div class="portion-visual-title">Visual portion guide</div>'+portionRows+'</div>'+
    '</div></div>';
}

function waterTracker(dow){
  var count=getWaterCount(dow);
  var target=8;
  var btns='';
  for(var i=0;i<target;i++){
    btns+='<button class="water-btn'+(i<count?' filled':'')+'" onclick="toggleWater('+dow+','+i+')" title="'+(i+1)*16+' oz">\uD83D\uDCA7</button>';
  }
  return '<div class="water-tracker">'+
    '<div class="water-title"><span class="water-label">\uD83D\uDCA7 Water intake</span><span class="water-count"><span>'+count+'</span> / '+target+' bottles</span></div>'+
    '<div class="water-bottles">'+btns+'</div>'+
    '<div class="water-oz" style="font-size:11px;color:#5f5e6e;margin-top:6px">'+count*16+' oz consumed - target '+(target*16)+' oz ('+Number(target*16/128).toFixed(1)+' gal) - Each bottle = 16 oz</div>'+
    '</div>';
}

function renderToday(dow){
  var type=getDayType(dow);
  var meals=getDayMeals(dow);
  var wk=null;for(var wi=0;wi<WORKOUTS.length;wi++){if(WORKOUTS[wi].dow===dow){wk=WORKOUTS[wi];break;}}
  var eatenPro=0,totalPro=0,eatenCal=0;
  var slots=Object.keys(meals);
  for(var si=0;si<slots.length;si++){
    var slot=slots[si];var meal=meals[slot];
    var m=getMult(meal.id);
    totalPro+=Math.round(meal.pro*m);
    if(isMealEaten(dow,slot)){eatenPro+=Math.round(meal.pro*m);eatenCal+=Math.round(meal.cal*m);}
  }
  var water=getWaterCount(dow);
  var wDone=isWorkoutDone(dow);
  var hr=new Date().getHours();
  var greeting=hr<12?'morning':hr<17?'afternoon':'evening';
  var html=dayNav();
  html+='<div class="today-hero">'+
    '<div class="hero-greeting">Good '+greeting+', Jordan</div>'+
    '<div class="hero-title">'+getDayLabel(type)+'</div>'+
    '<div class="hero-sub">'+(type==='work'?'Night shift tonight - gym on your 1-hour break.':type==='transition'?'Recovery day. Sleep is the priority.':'Off day. Best chance at quality sleep tonight.')+'</div>'+
    '<div class="stat-row">'+
    '<div class="stat-box"><div class="stat-val">'+eatenCal+'</div><div class="stat-lbl">Cal eaten</div></div>'+
    '<div class="stat-box"><div class="stat-val">'+eatenPro+'g</div><div class="stat-lbl">Protein eaten</div></div>'+
    '<div class="stat-box"><div class="stat-val">'+water*16+'oz</div><div class="stat-lbl">Water</div></div>'+
    '</div>'+
    '<div class="progress-ring"><span class="ring-label">Protein</span><div class="ring-bar-bg"><div class="ring-bar" style="width:'+Math.min(100,Math.round(eatenPro/185*100))+'%;background:#e8a23a"></div></div><span class="ring-pct" style="color:#e8a23a">'+Math.round(eatenPro/185*100)+'%</span></div>'+
    '<div class="progress-ring"><span class="ring-label">Calories</span><div class="ring-bar-bg"><div class="ring-bar" style="width:'+Math.min(100,Math.round(eatenCal/2200*100))+'%;background:#3ab8a2"></div></div><span class="ring-pct" style="color:#3ab8a2">'+Math.round(eatenCal/2200*100)+'%</span></div>'+
    '<div class="progress-ring"><span class="ring-label">Water</span><div class="ring-bar-bg"><div class="ring-bar" style="width:'+Math.min(100,Math.round(water/8*100))+'%;background:#378ADD"></div></div><span class="ring-pct" style="color:#378ADD">'+Math.round(water/8*100)+'%</span></div>'+
    '</div>';
  html+=waterTracker(dow);
  html+='<div class="section-label">Today\'s meals</div>';
  for(var si2=0;si2<slots.length;si2++){html+=mealCard(meals[slots[si2]],slots[si2],dow);}
  if(wk){
    html+='<div class="section-label" style="margin-top:20px">Tonight\'s workout</div>'+
      '<div class="workout-card'+(wDone?' done':'')+'">'+
      '<div class="wk-head">'+
      '<div class="wk-top"><div class="wk-title">'+wk.focus+'</div><div class="wk-badge'+(wDone?' done':'')+'">'+( wDone?'\u2713 Done':wk.day)+'</div></div>'+
      '<div class="wk-meta"><div class="wk-chip">45 min</div><div class="wk-chip">'+wk.exercises.length+' exercises</div></div></div>'+
      '<button class="workout-done-btn '+(wDone?'completed':'pending')+'" onclick="toggleWorkout('+dow+')">'+(wDone?'\u2713 Workout complete - tap to undo':'Mark workout done')+'</button>'+
      '</div>';
  }
  return html;
}

function renderMeals(dow){
  var meals=getDayMeals(dow);
  var slots=Object.keys(meals);
  var eatenPro=0;
  for(var i=0;i<slots.length;i++){var meal=meals[slots[i]];if(isMealEaten(dow,slots[i]))eatenPro+=Math.round(meal.pro*getMult(meal.id));}
  var html=dayNav();
  html+='<div class="stat-row" style="margin-bottom:14px">'+
    '<div class="stat-box"><div class="stat-val" style="font-size:16px">2,200</div><div class="stat-lbl">Target cal</div></div>'+
    '<div class="stat-box"><div class="stat-val" style="font-size:16px">185g</div><div class="stat-lbl">Target protein</div></div>'+
    '<div class="stat-box"><div class="stat-val" style="font-size:16px">'+eatenPro+'g</div><div class="stat-lbl">Eaten so far</div></div>'+
    '</div>';

  for(var i2=0;i2<slots.length;i2++){html+=mealCard(meals[slots[i2]],slots[i2],dow);}
  return html;
}

function renderShopping(){
  var s=getState();
  var wk=getWeekKey(shopWeekOffset);
  var checked=(s.shop&&s.shop[wk])||{};
  var expanded=s.shopExpanded||{};
  var wkDate=new Date(wk);
  var wkEnd=new Date(wkDate);wkEnd.setDate(wkEnd.getDate()+6);
  function fmtD(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  var wkLabel='Week of '+fmtD(wkDate)+' - '+fmtD(wkEnd);
  var totalItems=0;var checkedCount=0;
  for(var si=0;si<SHOP_SECTIONS.length;si++){totalItems+=SHOP_SECTIONS[si].items.length;for(var ii=0;ii<SHOP_SECTIONS[si].items.length;ii++){if(checked[SHOP_SECTIONS[si].items[ii].id])checkedCount++;}}
  var html='<div class="shop-week-nav">'+
    '<button class="shop-nav-btn" onclick="changeShopWeek(-1)">\u2190 Prev</button>'+
    '<div><div class="shop-week-label">'+wkLabel+'</div><div style="font-size:11px;color:#5f5e6e;margin-top:2px">'+(shopWeekOffset===0?'Next week (upcoming)':shopWeekOffset<0?'Past week':'Future week')+'</div></div>'+
    '<button class="shop-nav-btn" onclick="changeShopWeek(1)">Next \u2192</button>'+
    '</div>';
  html+='<div class="shop-progress">'+
    '<span style="font-size:12px;color:#9998a8">'+checkedCount+' / '+totalItems+' items</span>'+
    '<div style="flex:1;margin:0 8px"><div class="ring-bar-bg"><div class="ring-bar" style="width:'+Math.round(checkedCount/totalItems*100)+'%;background:#3ab8a2"></div></div></div>'+
    '<span style="font-size:12px;color:#3ab8a2;font-weight:600">'+Math.round(checkedCount/totalItems*100)+'%</span>'+
    '</div>';
  for(var si2=0;si2<SHOP_SECTIONS.length;si2++){
    var sec=SHOP_SECTIONS[si2];
    var secChecked=0;for(var ii2=0;ii2<sec.items.length;ii2++){if(checked[sec.items[ii2].id])secChecked++;}
    var isOpen=expanded[sec.id]!==false;
    html+='<div class="shop-section">'+
      '<div class="shop-section-hdr" onclick="toggleShopSection(\''+sec.id+'\')">'+
      '<span class="shop-section-title">'+sec.label+'</span>'+
      '<span class="shop-count">'+secChecked+'/'+sec.items.length+' '+(isOpen?'\u25B2':'\u25BC')+'</span>'+
      '</div>';
    if(isOpen){
      html+='<div class="shop-items-list">';
      for(var ii3=0;ii3<sec.items.length;ii3++){
        var item=sec.items[ii3];
        var isChecked=!!checked[item.id];
        html+='<div class="shop-item" onclick="toggleShopItem(\''+item.id+'\',\''+wk+'\')">'+
          '<div class="shop-cb'+(isChecked?' checked':'')+'">'+(isChecked?'<span style="color:#000;font-size:11px;font-weight:700">\u2713</span>':'')+'</div>'+
          '<div style="flex:1">'+
          '<div class="shop-item-name'+(isChecked?' checked':'')+'">'+item.name+'</div>'+
          (item.note?'<div class="shop-note">'+item.note+'</div>':'')+
          '</div>'+
          '<div class="shop-amt'+(isChecked?' checked':'')+'">'+item.amt+'</div>'+
          '</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  html+='<button class="shop-reset" onclick="resetShop(\''+wk+'\')">Reset all checkboxes for this week</button>';
  return html;
}

    '<div class="upload-label">Upload blood panel PDF</div>'+
    '<div class="upload-sub">Tap to select a PDF - the app will read your results and provide personalized adjustments</div>'+
    '</div>';
  if(s.labsAnalyzing){
    html+='<div class="analyzing-badge"><div class="analyzing-dot"></div><span style="font-size:13px;color:#e8a23a">Analyzing your lab results...</span></div>';
  }
  if(labs){
    html+='<div class="labs-card">'+
      '<div class="labs-title">Latest Lab Results</div>'+
      '<div class="labs-date">'+labs.date+'</div>';

      var v=labs.values[i];

        '<div><div class="lab-name">'+v.name+'</div><div class="lab-range">Range: '+v.range+'</div></div>'+

    if(labs.insights&&labs.insights.length){

      for(var j=0;j<labs.insights.length;j++){
        var ins=labs.insights[j];

      '<div class="labs-title">Baseline Labs (April 2026)</div>'+
      '<div class="labs-date">Ordered by Stephen Toth PA - 04/14/2026</div>'+
      '<div class="lab-row"><div><div class="lab-name">Triglycerides</div><div class="lab-range">Normal: 0-149 mg/dL</div></div><div class="lab-val bad">317</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">HDL Cholesterol</div><div class="lab-range">Normal: &gt;39 mg/dL</div></div><div class="lab-val bad">33</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">LDL Cholesterol</div><div class="lab-range">Optimal: &lt;100 mg/dL</div></div><div class="lab-val warn">104</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">Total Cholesterol</div><div class="lab-range">Normal: 100-199 mg/dL</div></div><div class="lab-val good">188</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">VLDL Cholesterol</div><div class="lab-range">Normal: 5-40 mg/dL</div></div><div class="lab-val bad">51</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">Glucose</div><div class="lab-range">Normal: 70-99 mg/dL</div></div><div class="lab-val warn">98</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">ALT (liver)</div><div class="lab-range">Normal: 0-44 IU/L</div></div><div class="lab-val warn">55</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">Vitamin D</div><div class="lab-range">Normal: 30-100 ng/mL</div></div><div class="lab-val warn">25.9</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">Hemoglobin</div><div class="lab-range">Normal: 13.0-17.7 g/dL</div></div><div class="lab-val good">15.8</div></div>'+
      '<div class="lab-row"><div><div class="lab-name">eGFR (kidney)</div><div class="lab-range">Normal: &gt;59</div></div><div class="lab-val good">92</div></div>'+

// Actions
function switchTab(tab,btn){
  currentTab=tab;
  var btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  if(btn)btn.classList.add('active');
  else{var tabs=['today','meals','workouts','shopping','labs'];var idx=tabs.indexOf(tab);if(idx>=0)btns[idx].classList.add('active');}
  render();
}
function changeDay(dow){currentDow=dow;render();}
function changeShopWeek(dir){shopWeekOffset+=dir;render();}

function adjPortion(id,dir){
  var STEPS=[0.5,0.75,1,1.25,1.5,1.75,2,2.5];
  setState(function(s){
    if(!s.portions)s.portions={};
    var cur=(s.portions[id]||1);
    var idx=STEPS.indexOf(cur);
    var ni=Math.max(0,Math.min(STEPS.length-1,idx+dir));
    s.portions[id]=STEPS[ni];
  });
  render();
}
function toggleEaten(slot,dow){setState(function(s){if(!s.eaten)s.eaten={};var dk=getDateKey(dow);if(!s.eaten[dk])s.eaten[dk]={};s.eaten[dk][slot]=!s.eaten[dk][slot];});render();}
function toggleWorkout(dow){setState(function(s){if(!s.workouts)s.workouts={};var dk=getDateKey(dow);s.workouts[dk]=!s.workouts[dk];});render();}
function toggleWater(dow,idx){
  setState(function(s){
    if(!s.water)s.water={};
    var dk=getDateKey(dow);var cur=(s.water[dk]||0);
    s.water[dk]=(cur===idx+1)?idx:idx+1;
  });
  render();
}
function toggleShopItem(itemId,wk){setState(function(s){if(!s.shop)s.shop={};if(!s.shop[wk])s.shop[wk]={};s.shop[wk][itemId]=!s.shop[wk][itemId];});render();}
function toggleShopSection(secId){setState(function(s){if(!s.shopExpanded)s.shopExpanded={};var cur=s.shopExpanded[secId];s.shopExpanded[secId]=(cur===false)?true:false;});render();}
function resetShop(wk){setState(function(s){if(s.shop)s.shop[wk]={};});render();}
function toggleEl(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

function openSwap(slot,dow){
  var current=getMeal(dow,slot);
  var pool=allMeals().filter(function(m){return m.id!==current.id;}).sort(function(){return Math.random()-.5;}).slice(0,6);
  var label={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snack'}[slot];
  var html='<div class="drawer-title">Swap '+label+'</div><div class="drawer-sub">Tap "Use this" to replace today\'s '+label.toLowerCase()+'</div>';
  for(var i=0;i<pool.length;i++){
    var m=pool[i];
    html+='<div class="swap-item">'+
      '<div class="swap-emoji-box">'+m.emoji+'</div>'+
      '<div class="swap-info"><div class="swap-name">'+m.name+'</div><div class="swap-macros">'+m.cal+' cal - '+m.pro+'g protein - '+m.carb+'g carbs</div></div>'+
      '<button class="use-btn" onclick="doSwap(\''+slot+'\','+dow+',\''+m.id+'\')">Use this</button>'+
      '</div>';
  }
  showDrawer(html);
}
function doSwap(slot,dow,mealId){
  var meal=allMeals().filter(function(m){return m.id===mealId;})[0];
  setState(function(s){if(!s.swaps)s.swaps={};var dk=getDateKey(dow);if(!s.swaps[dk])s.swaps[dk]={};s.swaps[dk][slot]=meal;});
  closeDrawer();setTimeout(render,320);
}
function openRecipe(mealId){
  var meal=allMeals().filter(function(m){return m.id===mealId;})[0];
  if(!meal)return;
  var r=meal.recipe;
  var ings='';for(var i=0;i<r.ings.length;i++){ings+='<div class="ing-row"><span class="ing-name">'+r.ings[i][0]+'</span><span class="ing-amt">'+r.ings[i][1]+'</span></div>';}
  var steps='';for(var j=0;j<r.steps.length;j++){steps+='<div class="step-row"><div class="step-num">'+(j+1)+'</div><div>'+r.steps[j]+'</div></div>';}
  var html='<div class="drawer-title">'+meal.name+'</div>'+
    '<div class="recipe-body">'+
    '<div class="rec-section">Ingredients</div>'+ings+
    '<div class="rec-section">Instructions</div>'+steps+
    (r.batch?'<div class="batch-tip">Batch tip: '+r.batch+'</div>':'')+
    (r.link?'<a class="rec-link" href="'+r.link+'" target="_blank"><span>Full recipe with photos and video</span><span>\u2192</span></a>':'')+
    '</div>';
  showDrawer(html);
}
function showDrawer(html){document.getElementById('drawerInner').innerHTML=html;document.getElementById('overlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

// PDF / Labs upload
function handlePDF(event){
  var file=event.target.files[0];
  if(!file)return;
  setState(function(s){s.labsAnalyzing=true;});
  render();
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    analyzePDF(base64,file.name);
  };
  reader.readAsDataURL(file);
  event.target.value='';
}

function analyzePDF(base64data,filename){
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{
        role:'user',
        content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64data}},
          {type:'text',text:'This is a blood lab results PDF for Jordan Walters, a 37-year-old male, 6\'2", 226 lbs, night shift worker with a bulged disc in his back. His health goals are: lose fat, build muscle, improve cholesterol (triglycerides were 317, HDL was 33, LDL was 104 in April 2026). He avoids seafood and loves ethnic food. He batch cooks and meal preps.\n\nPlease extract the lab values and return ONLY a JSON object with no markdown, no explanation, just the raw JSON:\n{\n  "date": "the collection date as a string",\n  "values": [\n    {"name": "test name", "value": "numeric value with units", "range": "reference range", "status": "good|warn|bad"}\n  ],\n  "insights": [\n    {"title": "short insight title", "text": "1-2 sentence personalized recommendation based on this result for Jordan"}\n  ]\n}\n\nFor status: good = in normal range, warn = borderline/slightly outside range, bad = significantly outside range. Only include insights for values that are outside normal range or borderline. Focus on triglycerides, HDL, LDL, glucose, liver enzymes, vitamin D, and any new flags.'}
        ]
      }]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var text='';
    for(var i=0;i<data.content.length;i++){if(data.content[i].type==='text')text+=data.content[i].text;}
    try{
      var clean=text.replace(/```json|```/g,'').trim();
      var parsed=JSON.parse(clean);
      setState(function(s){s.labs=parsed;s.labsAnalyzing=false;});
    }catch(e){
      setState(function(s){
        s.labs={date:filename,values:[],insights:[{title:'Parse note',text:'Lab values were extracted but could not be formatted automatically. Your PDF may use an unusual format. Try uploading a different PDF or contact support.'}]};
        s.labsAnalyzing=false;
      });
    }
    render();
  })
  .catch(function(err){
    setState(function(s){
      s.labs={date:filename,values:[],insights:[{title:'Upload note',text:'Could not connect to the analysis service. Make sure you are using the app through Claude.ai or a hosted environment with API access.'}]};
      s.labsAnalyzing=false;
    });
    render();
  });
}

function render(){
  renderHeader(currentDow);
  var map={today:renderToday,meals:renderMeals,workouts:renderWorkouts,shopping:renderShopping,labs:renderLabs};
  document.getElementById('content').innerHTML=map[currentTab](currentDow);
}
render();
</script>
